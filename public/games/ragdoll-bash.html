<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>RAGDOLL BASH</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{width:100%;height:100%;overflow:hidden;background:#080812;font-family:'Impact','Arial Black',sans-serif;touch-action:none;}
  #c{display:block;width:100vw;height:100vh;cursor:crosshair;}
  #ui{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:10;}

  /* TOP BAR */
  #top{display:flex;justify-content:space-between;align-items:flex-start;padding:10px 14px;gap:10px;flex-wrap:wrap;}
  #hpBox{display:flex;align-items:center;gap:7px;}
  #hpIcon{font-size:22px;filter:drop-shadow(0 0 6px #f00);}
  #hpBg{width:clamp(100px,28vw,160px);height:18px;background:rgba(0,0,0,.7);border:2px solid #ff3333;border-radius:9px;overflow:hidden;}
  #hpFill{height:100%;background:linear-gradient(90deg,#ff2222,#ff7777);border-radius:7px;transition:width .2s;}
  #coins{display:flex;align-items:center;gap:6px;background:rgba(0,0,0,.75);border:2px solid #ffaa00;border-radius:20px;padding:4px 12px;}
  #coinIcon{font-size:18px;}
  #coinNum{color:#ffee44;font-size:17px;font-weight:900;letter-spacing:.5px;}

  /* WEAPON BAR */
  #wBar{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);display:flex;gap:6px;padding:7px;background:rgba(0,0,0,.82);border:2px solid rgba(255,255,255,.15);border-radius:16px;pointer-events:all;max-width:calc(100vw - 16px);overflow-x:auto;-ms-overflow-style:none;scrollbar-width:none;}
  #wBar::-webkit-scrollbar{display:none;}
  .wBtn{display:flex;flex-direction:column;align-items:center;justify-content:center;width:clamp(52px,13vw,68px);height:clamp(52px,13vw,68px);border-radius:12px;border:2px solid rgba(255,255,255,.25);background:rgba(255,255,255,.05);cursor:pointer;flex-shrink:0;position:relative;transition:all .12s;user-select:none;}
  .wBtn:active{transform:scale(.9);}
  .wBtn.sel{border-color:#ffaa00;background:rgba(255,170,0,.18);box-shadow:0 0 14px rgba(255,160,0,.45);}
  .wBtn.locked{opacity:.5;}
  .wIcon{font-size:clamp(20px,5vw,28px);line-height:1;}
  .wLabel{font-size:clamp(7px,1.8vw,9px);color:rgba(255,255,255,.7);text-transform:uppercase;letter-spacing:.5px;margin-top:2px;}
  .wCost{position:absolute;top:-7px;right:-7px;background:#ffaa00;color:#000;font-size:8px;font-weight:900;padding:2px 4px;border-radius:8px;}

  /* FLOATING TEXT */
  .flt{position:fixed;pointer-events:none;font-size:clamp(18px,4vw,26px);font-weight:900;text-shadow:2px 2px 0 #000;animation:fltAnim 1.1s ease-out forwards;z-index:20;}
  .flt.dmg{color:#ff4444;text-shadow:0 0 10px rgba(255,0,0,.7),2px 2px 0 #000;}
  .flt.coin{color:#ffee44;text-shadow:0 0 10px rgba(255,220,0,.7),2px 2px 0 #000;}
  @keyframes fltAnim{0%{transform:translateY(0) scale(1.2);opacity:1;}60%{opacity:1;}100%{transform:translateY(-70px) scale(.8);opacity:0;}}

  /* COMBO */
  #combo{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);color:#ffaa00;font-size:clamp(32px,8vw,60px);font-weight:900;letter-spacing:3px;text-shadow:0 0 20px rgba(255,160,0,.8),3px 3px 0 #000;display:none;pointer-events:none;z-index:25;animation:comboPop .5s ease forwards;}
  @keyframes comboPop{0%{transform:translate(-50%,-50%) scale(.5);opacity:0;}50%{transform:translate(-50%,-50%) scale(1.15);}100%{transform:translate(-50%,-50%) scale(1);opacity:1;}}

  /* DEATH / RESPAWN */
  #koScreen{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,.9);border:3px solid #ff3333;color:#ff3333;font-size:clamp(22px,5vw,44px);padding:18px 36px;border-radius:16px;text-align:center;display:none;z-index:30;letter-spacing:2px;animation:koPulse 0.6s ease infinite alternate;}
  @keyframes koPulse{from{box-shadow:0 0 10px rgba(255,0,0,.4);}to{box-shadow:0 0 30px rgba(255,0,0,.9),0 0 60px rgba(255,0,0,.4);}}
  #koSub{font-size:clamp(12px,2.5vw,16px);color:#ff8888;margin-top:6px;font-family:sans-serif;font-weight:normal;letter-spacing:1px;}

  /* UNLOCK TOAST */
  #toast{position:fixed;top:70px;left:50%;transform:translateX(-50%);background:linear-gradient(135deg,#ffaa00,#ff6600);color:#000;font-weight:900;font-size:clamp(13px,3.5vw,17px);padding:9px 20px;border-radius:12px;display:none;z-index:30;white-space:nowrap;}

  /* HIT FLASH */
  #flash{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;opacity:0;background:rgba(255,80,0,.35);transition:opacity .05s;z-index:6;}

  /* HINT */
  @keyframes hintFade{from{opacity:1;}to{opacity:0;}}

  #score{position:fixed;top:10px;left:50%;transform:translateX(-50%);color:rgba(80,30,0,.5);font-size:clamp(10px,2vw,13px);letter-spacing:2px;pointer-events:none;}
  #hint{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);color:rgba(80,30,0,.6);font-size:clamp(11px,2.5vw,14px);text-align:center;pointer-events:none;animation:hintFade 4s 2s ease forwards;font-family:sans-serif;}
</style>
</head>

<canvas id="c"></canvas>
<div id="ui">
  <div id="top">
    <div id="hpBox"><span id="hpIcon">❤️</span><div id="hpBg"><div id="hpFill"></div></div></div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
'use strict';
// ─────────────────────────────────────────────────────────────
//  RAGDOLL BASH  –  Complete Physics Sandbox Game
//  Built with Three.js r128 + Custom Verlet Physics
// ─────────────────────────────────────────────────────────────

// ══════════════════════════════════════════════════════════════
//  RENDERER & SCENE SETUP
// ══════════════════════════════════════════════════════════════
const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.15;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0xc9a450);
scene.fog = new THREE.FogExp2(0xc8982a, 0.028);

const camera = new THREE.PerspectiveCamera(58, innerWidth / innerHeight, 0.1, 80);

window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
});

// ══════════════════════════════════════════════════════════════
//  LIGHTING
// ══════════════════════════════════════════════════════════════
scene.add(new THREE.AmbientLight(0xffcc88, 0.85));

const sun = new THREE.DirectionalLight(0xfff5dd, 1.4);
sun.position.set(3, 9, 4);
sun.castShadow = true;
sun.shadow.mapSize.set(1024, 1024);
sun.shadow.camera.near = 0.1; sun.shadow.camera.far = 28;
sun.shadow.camera.left = -8; sun.shadow.camera.right = 8;
sun.shadow.camera.top = 9;   sun.shadow.camera.bottom = -9;
sun.shadow.bias = -0.001;
scene.add(sun);

const rimLight = new THREE.DirectionalLight(0xff8822, 0.3);
rimLight.position.set(-6, 5, -8);
scene.add(rimLight);

// Character follow light
const charLight = new THREE.PointLight(0xffeecc, 0.5, 6);
scene.add(charLight);

// ══════════════════════════════════════════════════════════════
//  ENVIRONMENT
// ══════════════════════════════════════════════════════════════
(function buildEnv() {
  // ── Wood floor texture ────────────────────────────────────────
  const S = 512;
  const cv = document.createElement('canvas'); cv.width = cv.height = S;
  const ctx = cv.getContext('2d');
  // Warm wood base
  const wg = ctx.createLinearGradient(0, 0, S, 0);
  wg.addColorStop(0,   '#c8822a');
  wg.addColorStop(.3,  '#d9923a');
  wg.addColorStop(.6,  '#c07828');
  wg.addColorStop(1,   '#b86e22');
  ctx.fillStyle = wg; ctx.fillRect(0, 0, S, S);
  // Wood grain lines
  ctx.strokeStyle = 'rgba(80,30,0,.18)'; ctx.lineWidth = 1.5;
  for (let i = 0; i < 28; i++) {
    const y = (i / 28) * S;
    ctx.beginPath(); ctx.moveTo(0, y);
    for (let x = 0; x <= S; x += 30) {
      ctx.lineTo(x, y + (Math.random()-.5)*3);
    }
    ctx.stroke();
  }
  // Plank seams
  ctx.strokeStyle = 'rgba(60,20,0,.35)'; ctx.lineWidth = 3;
  for (let i = 1; i < 6; i++) {
    ctx.beginPath(); ctx.moveTo(0, i*S/6); ctx.lineTo(S, i*S/6); ctx.stroke();
  }
  // Knots
  for (let i = 0; i < 5; i++) {
    const kx = Math.random()*S, ky = Math.random()*S;
    ctx.strokeStyle = 'rgba(60,20,0,.25)'; ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.ellipse(kx, ky, 8, 5, Math.random(), 0, Math.PI*2); ctx.stroke();
  }
  const floorTex = new THREE.CanvasTexture(cv);
  floorTex.wrapS = floorTex.wrapT = THREE.RepeatWrapping; floorTex.repeat.set(4, 4);

  const floor = new THREE.Mesh(
    new THREE.PlaneGeometry(22, 18),
    new THREE.MeshLambertMaterial({ map: floorTex })
  );
  floor.rotation.x = -Math.PI / 2; floor.receiveShadow = true;
  scene.add(floor);

  // ── Wall texture (warm cream/tan plaster) ─────────────────────
  function mkWallTex(w, h) {
    const wc = document.createElement('canvas'); wc.width = w; wc.height = h;
    const wx = wc.getContext('2d');
    const wg2 = wx.createLinearGradient(0,0,0,h);
    wg2.addColorStop(0,'#d8b870'); wg2.addColorStop(1,'#c9a450');
    wx.fillStyle = wg2; wx.fillRect(0,0,w,h);
    for(let i=0;i<3000;i++){
      wx.fillStyle=`rgba(100,50,0,${Math.random()*.05})`;
      wx.fillRect(Math.random()*w,Math.random()*h,2,2);
    }
    return new THREE.CanvasTexture(wc);
  }

  // Back wall
  const bw = new THREE.Mesh(
    new THREE.PlaneGeometry(22, 11),
    new THREE.MeshLambertMaterial({ map: mkWallTex(512, 256) })
  );
  bw.position.set(0, 5.5, -9); bw.receiveShadow = true; scene.add(bw);

  // Left wall
  const lw = new THREE.Mesh(
    new THREE.PlaneGeometry(18, 11),
    new THREE.MeshLambertMaterial({ map: mkWallTex(512, 256) })
  );
  lw.position.set(-11, 5.5, 0); lw.rotation.y = Math.PI/2; lw.receiveShadow = true; scene.add(lw);

  // Right wall
  const rw = new THREE.Mesh(
    new THREE.PlaneGeometry(18, 11),
    new THREE.MeshLambertMaterial({ map: mkWallTex(512, 256) })
  );
  rw.position.set(11, 5.5, 0); rw.rotation.y = -Math.PI/2; rw.receiveShadow = true; scene.add(rw);

  // Wood baseboard trim
  const trim = new THREE.MeshLambertMaterial({ color: 0x7a4010 });
  [[-9, 0, 0], [0, Math.PI/2, -11], [0, -Math.PI/2, 11]].forEach(([rz, ry, px]) => {
    const t = new THREE.Mesh(new THREE.BoxGeometry(22, 0.28, 0.15), trim);
    t.position.set(px||0, .14, rz||0);
    t.rotation.y = ry||0; scene.add(t);
  });

  // ── Ceiling ───────────────────────────────────────────────────
  const ceil = new THREE.Mesh(
    new THREE.PlaneGeometry(22, 18),
    new THREE.MeshLambertMaterial({ color: 0xe8d08a })
  );
  ceil.rotation.x = Math.PI/2; ceil.position.set(0, 11, 0); scene.add(ceil);

  // ── Warm overhead lighting ────────────────────────────────────
  // Main ceiling lamp
  const lamp = new THREE.Mesh(
    new THREE.SphereGeometry(.25, 10, 8),
    new THREE.MeshBasicMaterial({ color: 0xfffadd })
  );
  lamp.position.set(0, 10.6, -1); scene.add(lamp);
  const mainL = new THREE.PointLight(0xfff4cc, 1.6, 20);
  mainL.position.set(0, 10.4, -1); scene.add(mainL);

  // Side accent lamps (warm orange)
  [[-7, 8, -7], [7, 8, -7]].forEach(([x,y,z]) => {
    const pl = new THREE.PointLight(0xff9944, .55, 12);
    pl.position.set(x,y,z); scene.add(pl);
    const lb = new THREE.Mesh(new THREE.SphereGeometry(.12,8,6),
      new THREE.MeshBasicMaterial({ color: 0xffaa44 }));
    lb.position.set(x,y,z); scene.add(lb);
  });
}());

// ══════════════════════════════════════════════════════════════
//  WEB AUDIO SYSTEM
// ══════════════════════════════════════════════════════════════
let audioCtx = null;
function getAC() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}

function playSound(type) {
  try {
    const ac = getAC(), now = ac.currentTime;
    const mkGain = (val) => { const g = ac.createGain(); g.gain.setValueAtTime(val, now); return g; };
    const out = (n, g) => { n.connect(g); g.connect(ac.destination); };

    if (type === 'punch') {
      const buf = ac.createBuffer(1, ac.sampleRate * .14, ac.sampleRate);
      const d = buf.getChannelData(0);
      for (let i = 0; i < d.length; i++) {
        const t = i / ac.sampleRate;
        d[i] = (Math.random()*2-1)*Math.exp(-t*38)*.9 + Math.sin(75*t*Math.PI*2)*Math.exp(-t*22)*.4;
      }
      const s = ac.createBufferSource(); s.buffer = buf;
      const g = mkGain(.65); out(s, g); s.start(now);
    }
    else if (type === 'gun') {
      const buf = ac.createBuffer(1, ac.sampleRate * .18, ac.sampleRate);
      const d = buf.getChannelData(0);
      for (let i = 0; i < d.length; i++) {
        const t = i / ac.sampleRate;
        d[i] = (Math.random()*2-1)*Math.exp(-t*55) + Math.sin(130*t*Math.PI*2)*Math.exp(-t*28)*.5;
      }
      const s = ac.createBufferSource(); s.buffer = buf;
      const hp = ac.createBiquadFilter(); hp.type = 'highpass'; hp.frequency.value = 150;
      const g = mkGain(.7); s.connect(hp); hp.connect(g); g.connect(ac.destination); s.start(now);
    }
    else if (type === 'shotgun') {
      for (let p = 0; p < 3; p++) {
        setTimeout(() => {
          try {
            const ac2 = getAC(), n2 = ac2.currentTime;
            const buf = ac2.createBuffer(1, ac2.sampleRate * .15, ac2.sampleRate);
            const d = buf.getChannelData(0);
            for (let i = 0; i < d.length; i++) d[i] = (Math.random()*2-1)*Math.exp(-i/d.length*30);
            const s = ac2.createBufferSource(); s.buffer = buf;
            const g = ac2.createGain(); g.gain.setValueAtTime(.5-p*.1, n2);
            s.connect(g); g.connect(ac2.destination); s.start(n2);
          } catch(e) {}
        }, p * 40);
      }
    }
    else if (type === 'explosion') {
      const buf = ac.createBuffer(1, ac.sampleRate * .9, ac.sampleRate);
      const d = buf.getChannelData(0);
      for (let i = 0; i < d.length; i++) {
        const t = i / ac.sampleRate;
        d[i] = (Math.random()*2-1)*Math.exp(-t*5)*.9 + Math.sin(35*t*Math.PI*2)*Math.exp(-t*3.5)*.5;
      }
      const s = ac.createBufferSource(); s.buffer = buf;
      const lp = ac.createBiquadFilter(); lp.type = 'lowpass'; lp.frequency.value = 600;
      const g = mkGain(.85); s.connect(lp); lp.connect(g); g.connect(ac.destination); s.start(now);
    }
    else if (type === 'laser') {
      const o = ac.createOscillator(); o.type = 'sawtooth';
      o.frequency.setValueAtTime(900, now);
      o.frequency.exponentialRampToValueAtTime(150, now + .22);
      const g = mkGain(.14); g.gain.exponentialRampToValueAtTime(.001, now + .22);
      out(o, g); o.start(now); o.stop(now + .22);
    }
    else if (type === 'coin') {
      const o = ac.createOscillator(); o.type = 'sine';
      o.frequency.setValueAtTime(900, now); o.frequency.setValueAtTime(1400, now + .06);
      const g = mkGain(.18); g.gain.exponentialRampToValueAtTime(.001, now + .18);
      out(o, g); o.start(now); o.stop(now + .2);
    }
  } catch(e) {}
}

// ══════════════════════════════════════════════════════════════
//  PHYSICS ENGINE  –  Verlet Integration + Distance Constraints
// ══════════════════════════════════════════════════════════════
class Particle {
  constructor(x, y, z, mass = 1) {
    this.pos  = new THREE.Vector3(x, y, z);
    this.prev = new THREE.Vector3(x, y, z);
    this.acc  = new THREE.Vector3();
    this.mass = mass;
  }

  /** Apply an instantaneous impulse (modifies prev to create velocity) */
  impulse(fx, fy, fz) {
    const im = 1 / this.mass;
    this.prev.x -= fx * im;
    this.prev.y -= fy * im;
    this.prev.z -= fz * im;
  }

  integrate(dt, g) {
    const vx = (this.pos.x - this.prev.x) * .968;
    const vy = (this.pos.y - this.prev.y) * .968;
    const vz = (this.pos.z - this.prev.z) * .968;

    // Floor friction
    const nearFloor = this.pos.y < .18;
    const fx2 = nearFloor ? .78 : 1;
    const fz2 = nearFloor ? .78 : 1;

    this.prev.copy(this.pos);
    this.pos.x += vx * fx2 + this.acc.x * dt * dt;
    this.pos.y += vy     + (this.acc.y + g) * dt * dt;
    this.pos.z += vz * fz2 + this.acc.z * dt * dt;
    this.acc.set(0, 0, 0);

    // Constraints
    if (this.pos.y < .1) {
      this.pos.y = .1;
      const penVy = this.pos.y - this.prev.y;
      if (penVy < -.0005) this.prev.y = this.pos.y + penVy * .22;
    }
    const W = 8;
    if (this.pos.x >  W) this.pos.x =  W;
    if (this.pos.x < -W) this.pos.x = -W;
    if (this.pos.z >  4.5) this.pos.z =  4.5;
    if (this.pos.z < -8)   this.pos.z = -8;
  }
}

class DistConstraint {
  constructor(i, j, rest, stiff = .9) {
    this.i = i; this.j = j; this.rest = rest; this.stiff = stiff;
  }
  solve(P) {
    const a = P[this.i], b = P[this.j];
    const dx = b.pos.x - a.pos.x, dy = b.pos.y - a.pos.y, dz = b.pos.z - a.pos.z;
    const d = Math.sqrt(dx*dx + dy*dy + dz*dz);
    if (d < 1e-5) return;
    const c = (d - this.rest) / d * this.stiff * .5;
    a.pos.x += dx*c; a.pos.y += dy*c; a.pos.z += dz*c;
    b.pos.x -= dx*c; b.pos.y -= dy*c; b.pos.z -= dz*c;
  }
}

// ══════════════════════════════════════════════════════════════
//  RAGDOLL  –  Particles + Constraints + Visual Meshes
// ══════════════════════════════════════════════════════════════
const PI = {
  HEAD:0, TTOP:1, TBOT:2,
  LS:3, RS:4, LE:5, RE:6, LH:7, RH:8,
  LHP:9, RHP:10, LK:11, RK:12, LA:13, RA:14
};

// Initial rest-pose positions [x, y, z]  — Buddy / Kick-the-Buddy proportions
const REST = [
  [ 0,    2.58, 0], // 0 HEAD       – round head
  [ 0,    2.02, 0], // 1 TORSO_TOP  – chest/shoulder anchor
  [ 0,    1.44, 0], // 2 TORSO_BOT  – hip anchor
  [-.46,  2.05, 0], // 3 L_SHOULDER
  [ .46,  2.05, 0], // 4 R_SHOULDER
  [-.76,  1.70, 0], // 5 L_ELBOW
  [ .76,  1.70, 0], // 6 R_ELBOW
  [-.88,  1.25, 0], // 7 L_HAND
  [ .88,  1.25, 0], // 8 R_HAND
  [-.22,  1.44, 0], // 9 L_HIP
  [ .22,  1.44, 0], //10 R_HIP
  [-.26,   .80, 0], //11 L_KNEE
  [ .26,   .80, 0], //12 R_KNEE
  [-.24,   .14, 0], //13 L_ANKLE
  [ .24,   .14, 0], //14 R_ANKLE
];

const CONNS = [
  [0,1],[1,2],          // spine
  [1,3],[1,4],          // shoulder beams
  [3,5],[5,7],          // L arm
  [4,6],[6,8],          // R arm
  [2,9],[2,10],         // hip joints
  [9,11],[11,13],       // L leg
  [10,12],[12,14],      // R leg
  [3,4],[9,10],         // shoulder width, hip width
  [0,2],[3,2],[4,2],    // diagonal spine stability
  [1,9],[1,10],         // torso-hip
  [7,9],[8,10],         // arm-hip cross (prevents spinning)
];

let PP = [], PC = [], meshStore = [], hitSpheres = [], bloodDecals = [];

function d3(a, b) {
  return Math.sqrt((a[0]-b[0])**2 + (a[1]-b[1])**2 + (a[2]-b[2])**2);
}

// ══════════════════════════════════════════════════════════════
//  TEXTURES – all procedural canvas
// ══════════════════════════════════════════════════════════════

// ── Burlap / sackcloth fabric texture ────────────────────────
function mkBurlapTex(baseColor='#C8903C', sz=128) {
  const cv = document.createElement('canvas'); cv.width = cv.height = sz;
  const cx = cv.getContext('2d');
  cx.fillStyle = baseColor; cx.fillRect(0,0,sz,sz);
  // Woven grid threads
  cx.strokeStyle='rgba(0,0,0,.08)'; cx.lineWidth=1;
  for(let i=0;i<=sz;i+=4){
    cx.beginPath(); cx.moveTo(i,0); cx.lineTo(i,sz); cx.stroke();
    cx.beginPath(); cx.moveTo(0,i); cx.lineTo(sz,i); cx.stroke();
  }
  // Random noise grain
  for(let i=0;i<sz*sz*.15;i++){
    const bv = Math.random()>.5 ? 'rgba(255,180,80,.06)' : 'rgba(0,0,0,.07)';
    cx.fillStyle=bv; cx.fillRect(Math.random()*sz,Math.random()*sz,2,2);
  }
  const t = new THREE.CanvasTexture(cv);
  t.wrapS=t.wrapT=THREE.RepeatWrapping; t.repeat.set(2,2); return t;
}

// ── Face texture – big eyes + wide smile ─────────────────────
function makeFaceTex() {
  const cv = document.createElement('canvas'); cv.width=cv.height=512;
  const cx = cv.getContext('2d');
  cx.clearRect(0,0,512,512);

  const drawEye = (ex, ey) => {
    const R = 62;  // BIG eyes
    // White sclera with subtle shadow edge
    const eg = cx.createRadialGradient(ex, ey, R*.3, ex, ey, R);
    eg.addColorStop(0,'#ffffff'); eg.addColorStop(1,'#e8e0d8');
    cx.fillStyle = eg;
    cx.beginPath(); cx.arc(ex, ey, R, 0, Math.PI*2); cx.fill();
    // Dark iris
    cx.fillStyle = '#110800';
    cx.beginPath(); cx.arc(ex, ey, R * .58, 0, Math.PI*2); cx.fill();
    // Primary glint — big bright oval top-left
    cx.fillStyle = 'rgba(255,255,255,.90)';
    cx.beginPath(); cx.ellipse(ex - R*.26, ey - R*.26, R*.24, R*.18, -.5, 0, Math.PI*2); cx.fill();
    // Secondary small glint bottom-right
    cx.fillStyle = 'rgba(255,255,255,.45)';
    cx.beginPath(); cx.arc(ex + R*.22, ey + R*.08, R*.09, 0, Math.PI*2); cx.fill();
  };

  drawEye(158, 190);   // left eye
  drawEye(354, 190);   // right eye

  // ── WIDE HAPPY SMILE ─────────────────────────────────────────
  // White teeth fill
  cx.save();
  cx.beginPath();
  cx.arc(256, 350, 110, .13*Math.PI, .87*Math.PI);
  cx.closePath();
  cx.fillStyle = '#fff8f0'; cx.fill();
  cx.restore();

  // Thick smile arc
  cx.strokeStyle = '#1a0800'; cx.lineWidth = 13; cx.lineCap = 'round';
  cx.beginPath(); cx.arc(256, 338, 112, .13*Math.PI, .87*Math.PI); cx.stroke();

  // Rosy cheeks – bigger and more visible
  cx.fillStyle = 'rgba(230, 95, 75, .22)';
  cx.beginPath(); cx.ellipse(96,  310, 60, 38, 0, 0, Math.PI*2); cx.fill();
  cx.beginPath(); cx.ellipse(416, 310, 60, 38, 0, 0, Math.PI*2); cx.fill();

  return new THREE.CanvasTexture(cv);
}

// ── Red T-shirt torso texture ─────────────────────────────────
function mkTorsoTex() {
  const cv = document.createElement('canvas'); cv.width=cv.height=512;
  const cx = cv.getContext('2d');

  // Bright red shirt body
  const bg = cx.createRadialGradient(256,220,20, 256,256,250);
  bg.addColorStop(0,'#ff5533'); bg.addColorStop(.5,'#ee3311'); bg.addColorStop(1,'#bb1100');
  cx.fillStyle=bg; cx.beginPath(); cx.arc(256,256,248,0,Math.PI*2); cx.fill();

  // Fabric weave
  cx.strokeStyle='rgba(0,0,0,.07)'; cx.lineWidth=1;
  for(let i=0;i<=512;i+=6){
    cx.beginPath(); cx.moveTo(i,0); cx.lineTo(i,512); cx.stroke();
    cx.beginPath(); cx.moveTo(0,i); cx.lineTo(512,i); cx.stroke();
  }

  // Collar – round neck opening at top
  cx.strokeStyle='rgba(255,255,255,.55)'; cx.lineWidth=12; cx.lineCap='round';
  cx.beginPath(); cx.arc(256, 256, 80, -.75*Math.PI, -.25*Math.PI); cx.stroke();
  // Collar inner darker
  cx.strokeStyle='rgba(150,30,10,.4)'; cx.lineWidth=6;
  cx.beginPath(); cx.arc(256, 256, 80, -.75*Math.PI, -.25*Math.PI); cx.stroke();

  // Front seam line down middle
  cx.strokeStyle='rgba(0,0,0,.12)'; cx.lineWidth=3; cx.setLineDash([8,6]);
  cx.beginPath(); cx.moveTo(256,176); cx.lineTo(256,440); cx.stroke();
  cx.setLineDash([]);

  // Sleeve crease marks on sides
  cx.strokeStyle='rgba(180,20,0,.25)'; cx.lineWidth=4;
  cx.beginPath(); cx.moveTo(80,200); cx.quadraticCurveTo(140,280,110,380); cx.stroke();
  cx.beginPath(); cx.moveTo(432,200); cx.quadraticCurveTo(372,280,402,380); cx.stroke();

  // Subtle shadow fold at bottom
  const sg = cx.createLinearGradient(0,380,0,480);
  sg.addColorStop(0,'rgba(0,0,0,0)'); sg.addColorStop(1,'rgba(0,0,0,.18)');
  cx.fillStyle=sg; cx.fillRect(0,380,512,132);

  return new THREE.CanvasTexture(cv);
}

// ── Navy blue pants texture ───────────────────────────────────
function mkPantsTex() {
  const cv = document.createElement('canvas'); cv.width=cv.height=256;
  const cx = cv.getContext('2d');

// ── Golden rope texture for torus joints ─────────────────────
function mkRopeTex() {
  const cv = document.createElement('canvas'); cv.width=128; cv.height=32;

// ══════════════════════════════════════════════════════════════
//  BONE ORIENTOR  (unchanged)
// ══════════════════════════════════════════════════════════════
const _up = new THREE.Vector3(0,1,0);
const _q  = new THREE.Quaternion();

function orientBone(mesh, pa, pb) {
  const mx=(pa.pos.x+pb.pos.x)*.5, my=(pa.pos.y+pb.pos.y)*.5, mz=(pa.pos.z+pb.pos.z)*.5;
  mesh.position.set(mx,my,mz);
  const dx=pb.pos.x-pa.pos.x, dy=pb.pos.y-pa.pos.y, dz=pb.pos.z-pa.pos.z;
  const len=Math.sqrt(dx*dx+dy*dy+dz*dz);
  if(len<1e-4) return;
  mesh.scale.y=len;
  _q.setFromUnitVectors(_up, new THREE.Vector3(dx/len,dy/len,dz/len));
  mesh.quaternion.copy(_q);
}

// Orient a torus ring perpendicular to the bone direction
function orientRing(mesh, pa, pb) {
  const bx=(pa.pos.x+pb.pos.x)*.5, by=(pa.pos.y+pb.pos.y)*.5, bz=(pa.pos.z+pb.pos.z)*.5;
  mesh.position.set(bx,by,bz);
  const dx=pb.pos.x-pa.pos.x, dy=pb.pos.y-pa.pos.y, dz=pb.pos.z-pa.pos.z;
  const len=Math.sqrt(dx*dx+dy*dy+dz*dz); if(len<1e-4) return;
  // Torus default axis is Z, we want it perpendicular to bone (bone axis = Y in OrientBone)
  // So rotate torus so its hole-axis aligns with bone direction
  const boneDir = new THREE.Vector3(dx/len,dy/len,dz/len);
  const torusDefault = new THREE.Vector3(0,0,1);
  _q.setFromUnitVectors(torusDefault, boneDir);
  mesh.quaternion.copy(_q);
}

// Orient a torus ring at a single particle position, facing camera
function ringAtParticle(mesh, p) {
  mesh.position.copy(p.pos);
  mesh.lookAt(camera.position);
}

// ══════════════════════════════════════════════════════════════
//  SYNC MESHES – update every frame
// ══════════════════════════════════════════════════════════════
function syncMeshes() {
  const P = PP;

  // ── HEAD ─────────────────────────────────────────────────────
  VM.head.position.copy(P[PI.HEAD].pos);

  // Face billboard – always faces camera
  VM.face.position.copy(P[PI.HEAD].pos);
  VM.face.lookAt(camera.position);
  const faceFwd = new THREE.Vector3().subVectors(camera.position, P[PI.HEAD].pos).normalize();
  VM.face.position.addScaledVector(faceFwd, .30);

  // ── NECK ROPE RING ────────────────────────────────────────────
  VM.neckRope.position.set(
    (P[PI.HEAD].pos.x + P[PI.TTOP].pos.x)*.5,
    (P[PI.HEAD].pos.y + P[PI.TTOP].pos.y)*.5,
    (P[PI.HEAD].pos.z + P[PI.TTOP].pos.z)*.5
  );
  VM.neckRope.lookAt(camera.position); // ring faces camera always

  // ── BLUE TORSO BELLY ─────────────────────────────────────────
  VM.belly.position.set(
    (P[PI.TTOP].pos.x + P[PI.TBOT].pos.x)*.5,
    (P[PI.TTOP].pos.y + P[PI.TBOT].pos.y)*.5,
    (P[PI.TTOP].pos.z + P[PI.TBOT].pos.z)*.5
  );

  // ── SHOULDER ROPE RINGS ───────────────────────────────────────
  ringAtParticle(VM.jLS, P[PI.LS]);
  ringAtParticle(VM.jRS, P[PI.RS]);

  // ── ARM LIMBS ─────────────────────────────────────────────────
  orientBone(VM.lUArm, P[PI.LS], P[PI.LE]);
  orientBone(VM.rUArm, P[PI.RS], P[PI.RE]);

  // ── ELBOW ROPE RINGS ──────────────────────────────────────────
  ringAtParticle(VM.jLE, P[PI.LE]);
  ringAtParticle(VM.jRE, P[PI.RE]);

  // ── FOREARM LIMBS ─────────────────────────────────────────────
  orientBone(VM.lFArm, P[PI.LE], P[PI.LH]);
  orientBone(VM.rFArm, P[PI.RE], P[PI.RH]);

  // ── HAND SPHERES ─────────────────────────────────────────────
  VM.lHand.position.copy(P[PI.LH].pos);
  VM.rHand.position.copy(P[PI.RH].pos);

  // ── HIP ROPE RINGS ────────────────────────────────────────────
  ringAtParticle(VM.jLH, P[PI.LHP]);
  ringAtParticle(VM.jRH, P[PI.RHP]);

  // ── LEG LIMBS ─────────────────────────────────────────────────
  orientBone(VM.lULeg, P[PI.LHP], P[PI.LK]);
  orientBone(VM.rULeg, P[PI.RHP], P[PI.RK]);

  // ── KNEE ROPE RINGS ───────────────────────────────────────────
  ringAtParticle(VM.jLK, P[PI.LK]);
  ringAtParticle(VM.jRK, P[PI.RK]);

  // ── LOWER LEGS ────────────────────────────────────────────────
  orientBone(VM.lLLeg, P[PI.LK], P[PI.LA]);
  orientBone(VM.rLLeg, P[PI.RK], P[PI.RA]);

  // ── FEET – flatten slightly near floor ───────────────────────
  VM.lFoot.position.copy(P[PI.LA].pos);
  VM.rFoot.position.copy(P[PI.RA].pos);
  const fsy = Math.max(.55, Math.min(1.0, P[PI.LA].pos.y * 3.5));
  VM.lFoot.scale.set(1.25, fsy, 1.5);
  VM.rFoot.scale.set(1.25, fsy, 1.5);

  // ── FOLLOW LIGHT ─────────────────────────────────────────────
  const cx=PP.reduce((s,p)=>s+p.pos.x,0)/PP.length;
  const cy=PP.reduce((s,p)=>s+p.pos.y,0)/PP.length;
  const cz=PP.reduce((s,p)=>s+p.pos.z,0)/PP.length;
  charLight.position.set(cx, cy+1.5, cz+1);
}

// Pose spring strength: 1 = fully upright (alive), 0 = full ragdoll (dead)
let poseSpring = 1.0;
let isRespawning = false;
let respawnPhase = 0; // 0=dead, 1=rising, 2=bouncing, 3=alive

function initRagdoll() {
  PP = REST.map(([x,y,z]) => new Particle(x, y, z));
  PC = CONNS.map(([i,j]) => new DistConstraint(i, j, d3(REST[i], REST[j]), .96));
  poseSpring = 1.0;
  buildRagdollMeshes();
  initHitSpheres();
}

// Spring constants per particle index – head/torso stronger, limbs weaker
const SPRING_K = [
  220, 200, 200,   // 0 head, 1 ttop, 2 tbot  — very stiff spine
  120, 120,        // 3,4 shoulders
   70,  70,        // 5,6 elbows
   40,  40,        // 7,8 hands
  160, 160,        // 9,10 hips
  110, 110,        // 11,12 knees
   80,  80,        // 13,14 ankles
];

function applyPoseSpring(dt) {
  if (poseSpring <= 0) return;
  PP.forEach((p, i) => {
    const rx = REST[i][0], ry = REST[i][1], rz = REST[i][2];
    const k = SPRING_K[i] * poseSpring;
    p.acc.x += (rx - p.pos.x) * k;
    p.acc.y += (ry - p.pos.y) * k;
    p.acc.z += (rz - p.pos.z) * k;
    // velocity damping when upright
    const damp = poseSpring * 0.72;
    const vx = p.pos.x - p.prev.x, vy = p.pos.y - p.prev.y, vz = p.pos.z - p.prev.z;
    p.acc.x -= vx * damp / (dt * dt + 1e-6);
    p.acc.y -= vy * damp / (dt * dt + 1e-6);
    p.acc.z -= vz * damp / (dt * dt + 1e-6);
  });
}

function stepPhysics(dt) {
  const G = isDead ? -14 : -9.5;
  if (!isDead) applyPoseSpring(dt);
  PP.forEach(p => p.integrate(dt, G));
  const iters = isDead ? 5 : 12;
  for (let k = 0; k < iters; k++) PC.forEach(c => c.solve(PP));
}

// Idle breathing / jiggle
let gameTime = 0;
let lastHitTime = -999;
function applyIdle(t) {
  if (isDead || isRespawning) return;
  const breathY = Math.sin(t * 1.6) * 2.2;
  PP[PI.TTOP].acc.y += breathY;
  PP[PI.TBOT].acc.y += breathY * .5;
  // Arm sway
  const swing = Math.sin(t * .9) * .6;
  PP[PI.LH].acc.x += swing * (1 - poseSpring * .3);
  PP[PI.RH].acc.x -= swing * (1 - poseSpring * .3);
  // Head look-around
  PP[PI.HEAD].acc.x += Math.sin(t * .4) * 1.5;
  PP[PI.HEAD].acc.z += Math.cos(t * .5) * .8;
}

// ══════════════════════════════════════════════════════════════
//  PARTICLE EFFECTS
// ══════════════════════════════════════════════════════════════
const FX = [];

class FXParticle {
  constructor(pos, vel, color, size, life) {
    const m = new THREE.Mesh(
      new THREE.SphereGeometry(size, 4, 3),
      new THREE.MeshBasicMaterial({ color, transparent: true })
    );
    m.position.copy(pos);
    this.mesh = m; this.vel = vel.clone();
    this.life = life; this.maxLife = life;
    scene.add(m);
  }
  tick(dt) {
    this.vel.y -= 16 * dt;
    this.mesh.position.addScaledVector(this.vel, dt);
    if (this.mesh.position.y < .06) {
      this.mesh.position.y = .06;
      this.vel.y = Math.abs(this.vel.y) * .25;
      this.vel.x *= .7; this.vel.z *= .7;
    }
    this.life -= dt;
    const t = Math.max(0, this.life / this.maxLife);
    this.mesh.scale.setScalar(Math.sqrt(t));
    this.mesh.material.opacity = t;
    return this.life > 0;
  }
  dispose() {
    scene.remove(this.mesh);
    this.mesh.geometry.dispose(); this.mesh.material.dispose();
  }
}

function spawnFX(pos, n, colors, speed, life, upBoost=2) {
  if (FX.length > 90) {
    for (let i=0; i<10; i++) { FX[0].dispose(); FX.shift(); }
  }
  for (let i=0; i<n; i++) {
    const vel = new THREE.Vector3(
      (Math.random()-.5)*speed, Math.random()*speed*.6+upBoost,
      (Math.random()-.5)*speed
    );
    const c = colors[Math.floor(Math.random()*colors.length)];
    const s = (.04 + Math.random()*.09);
    FX.push(new FXParticle(pos.clone(), vel, c, s, life * (.6 + Math.random()*.8)));
  }
}

function explode(pos, scale=1) {
  spawnFX(pos, Math.ceil(18*scale), [0xff6600,0xff4400,0xffaa00,0xff2200,0xffff44], 9*scale, .7, 3);
  spawnFX(pos, Math.ceil(8*scale),  [0xaaaaaa,0x888888], 6*scale, .5, 1);
  // Flash point light
  const fl = new THREE.PointLight(0xff6600, 4*scale, 8*scale);
  fl.position.copy(pos); scene.add(fl);
  setTimeout(() => scene.remove(fl), 120);
}

function sparks(pos, n=8) {
  spawnFX(pos, n, [0xffff66,0xffffaa,0xffffff], 5, .35, 2.5);
}

function blood(pos, n=6) {
  if (pos.y < .4) spawnBloodDecal(pos);
  spawnFX(pos, n, [0xcc0000,0x880000,0xaa2200], 3.5, .6, .4);
}

function spawnBloodDecal(pos) {
  const m = new THREE.Mesh(
    new THREE.CircleGeometry(.08+Math.random()*.18, 8),
    new THREE.MeshBasicMaterial({ color: 0x880000 })
  );
  m.rotation.x = -Math.PI/2;
  m.position.set(pos.x+(Math.random()-.5)*.3, .005, pos.z+(Math.random()-.5)*.3);
  scene.add(m); bloodDecals.push(m);
  if (bloodDecals.length > 25) {
    scene.remove(bloodDecals[0]); bloodDecals[0].geometry.dispose(); bloodDecals.shift();
  }
}

function tickFX(dt) {
  for (let i=FX.length-1; i>=0; i--) {
    if (!FX[i].tick(dt)) { FX[i].dispose(); FX.splice(i,1); }
  }
}

// ══════════════════════════════════════════════════════════════
//  PROJECTILES  (Grenade)
// ══════════════════════════════════════════════════════════════
const GRENADES = [];

class GrenadePrj {
  constructor(targetPos, force) {
    const m = new THREE.Mesh(
      new THREE.SphereGeometry(.1, 7, 5),
      new THREE.MeshLambertMaterial({ color: 0x44aa33 })
    );
    const startDir = new THREE.Vector3().subVectors(targetPos, camera.position).normalize();
    this.pos = camera.position.clone().addScaledVector(startDir, 1.8);
    this.vel = startDir.clone().multiplyScalar(10); this.vel.y += 4;
    this.mesh = m; this.life = 2.2; this.force = force;
    m.position.copy(this.pos); scene.add(m);
  }
  tick(dt) {
    this.vel.y -= 16 * dt;
    this.pos.addScaledVector(this.vel, dt);
    if (this.pos.y < .12) {
      this.pos.y = .12; this.vel.y = Math.abs(this.vel.y)*.3;
      this.vel.x *= .6; this.vel.z *= .6;
    }
    this.mesh.position.copy(this.pos);
    this.mesh.rotation.x += dt*5; this.mesh.rotation.z += dt*3;
    this.life -= dt;
    return this.life > 0;
  }
  boom() {
    const pos = this.pos.clone();
    explode(pos, 2.2);
    playSound('explosion');
    shakeCamera(.5);
    flashScreen('rgba(255,140,0,.35)');
    areaImpact(pos, 3.5, this.force * 1.2, 1.2);
    const dmg = 55 + randInt(25);
    dealDamage(dmg, innerWidth/2, innerHeight/2-60);
  }
  dispose() { scene.remove(this.mesh); this.mesh.geometry.dispose(); }
}

function tickGrenades(dt) {
  for (let i=GRENADES.length-1; i>=0; i--) {
    if (!GRENADES[i].tick(dt)) {
      GRENADES[i].boom(); GRENADES[i].dispose(); GRENADES.splice(i,1);
    }
  }
}

// ══════════════════════════════════════════════════════════════
//  GAME STATE
// ══════════════════════════════════════════════════════════════
let hp = 100, maxHp = 100, coins = 0, hitCount = 0;
let isDead = false, respawnT = 0;
let selWeapon = 'punch', lastFireT = 0;
let comboCount = 0, lastComboT = 0;

const WEAPONS = {
  punch:   { icon:'👊', label:'PUNCH',   cost:0,   dmg:14, cd:.25, force:9 },
  pistol:  { icon:'🔫', label:'PISTOL',  cost:0,   dmg:22, cd:.28, force:13 },
  shotgun: { icon:'💥', label:'SHOTGUN', cost:55,  dmg:38, cd:.6,  force:20 },
  grenade: { icon:'💣', label:'GRENADE', cost:110, dmg:55, cd:.9,  force:26 },
  laser:   { icon:'⚡', label:'LASER',   cost:220, dmg:4,  cd:.04, force:6  },
};

let unlocked = new Set(['punch','pistol']);

function randInt(n) { return Math.floor(Math.random()*n); }
function lerp(a, b, t) { return a + (b-a)*t; }

function areaImpact(center, radius, force, upB=.5) {
  PP.forEach(p => {
    const dx = p.pos.x-center.x, dy = p.pos.y-center.y, dz = p.pos.z-center.z;
    const d = Math.sqrt(dx*dx+dy*dy+dz*dz);
    if (d < radius) {
      const t = 1-d/radius, dl = d||.001;
      p.impulse(dx/dl*force*t, (dy/dl+upB)*force*t, dz/dl*force*t);
    }
  });
}

// ── Respawn star burst particles ─────────────────────────────
function spawnRespawnStars(pos) {
  const STAR_COLORS = [0xffee00, 0xff88ff, 0x00ffff, 0xff4488, 0x88ff44, 0xffaa00];
  for (let i = 0; i < 22; i++) {
    const ang = (i / 22) * Math.PI * 2;
    const spd = 3.5 + Math.random() * 3.5;
    const vel = new THREE.Vector3(
      Math.cos(ang) * spd * (.6 + Math.random() * .5),
      4 + Math.random() * 5,
      Math.sin(ang) * spd * (.6 + Math.random() * .5)
    );
    FX.push(new FXParticle(
      pos.clone().add(new THREE.Vector3(0, .5, 0)),
      vel,
      STAR_COLORS[i % STAR_COLORS.length],
      .1 + Math.random() * .1,
      1.1 + Math.random() * .6
    ));
  }
  // Ring flash light
  const fl = new THREE.PointLight(0xffee88, 5, 6);
  fl.position.copy(pos).y += 1.4; scene.add(fl);
  setTimeout(() => scene.remove(fl), 200);
}

function die() {
  isDead = true;
  poseSpring = 0;
  PC.forEach(c => { c.stiff = .3; });
  explode(getCenter(), 1.5);
  playSound('explosion');
  shakeCamera(.65);
  flashScreen('rgba(255,30,0,.45)');
  const ks = document.getElementById('koScreen');
  ks.style.display = 'block';
  respawnT = 3.8;
  respawnPhase = 0;
  // Countdown in sub
  let cd = 3;
  const sub = document.getElementById('koSub');
  sub.textContent = `Getting back up in ${cd}...`;
  const tid = setInterval(() => {
    cd--;
    if (cd > 0) sub.textContent = `Getting back up in ${cd}...`;
    else { sub.textContent = '✨ RISING! ✨'; clearInterval(tid); }
  }, 1000);
}

// ── Talking Tom style bounce respawn ─────────────────────────
function respawn() {
  document.getElementById('koScreen').style.display = 'none';
  isRespawning = true;
  respawnPhase = 1;

  // 1) Instantly rebuild particle positions at floor level
  //    but squished: scale Y positions down
  clearMeshes();
  PP = REST.map(([x, y, z]) => new Particle(x, y * 0.08, z));
  PC = CONNS.map(([i,j]) => new DistConstraint(i, j, d3(REST[i], REST[j]), .96));
  poseSpring = 0;
  buildRagdollMeshes();
  initHitSpheres();

  // 2) Star burst + sound at squish position
  const flatPos = new THREE.Vector3(0, .15, 0);
  spawnRespawnStars(flatPos);
  playSound('coin');

  // 3) Phase 1 – spring UP with overshoot (0.0–0.45s)
  //    Rapidly ramp pose spring to 1.4 (overshoot)
  let t = 0;
  const RISE_DUR = 0.38;
  const BOUNCE_DUR = 0.28;

  function riseFrame() {
    t += 1/60;
    const frac = Math.min(t / RISE_DUR, 1);
    // Ease-out elastic spring overshoot
    const overshoot = 1 + Math.sin(frac * Math.PI) * 0.45;
    poseSpring = frac * overshoot;

    // Squish→stretch scale on head mesh
    const stretchY = 0.5 + frac * 1.0; // 0.5→1.5
    const squishXZ = 1.3 - frac * 0.3;  // 1.3→1.0
    if (VM.head) {
      VM.head.scale.set(squishXZ, stretchY, squishXZ);
      VM.neckRope && VM.neckRope.scale.set(squishXZ, stretchY, squishXZ);
    }
    // Belly squish
    if (VM.belly) VM.belly.scale.set(squishXZ * 1.1, stretchY * .9, squishXZ * 1.1);

    if (frac < 1) {
      requestAnimationFrame(riseFrame);
    } else {
      poseSpring = 1.45; // overshoot
      bouncePhase();
    }
  }

  function bouncePhase() {
    // 4) Phase 2 – settle bounce (overshoot back to 1.0)
    let bt = 0;
    respawnPhase = 2;
    function bFrame() {
      bt += 1/60;
      const frac = Math.min(bt / BOUNCE_DUR, 1);
      // Damped oscillation settle: spring from 1.45 → 1.0
      poseSpring = 1 + 0.45 * Math.cos(frac * Math.PI * 2.5) * (1 - frac);
      // Head squish reverse
      if (VM.head) VM.head.scale.set(1, 1, 1);
      if (VM.belly) VM.belly.scale.set(1, 1, 1);
      if (VM.neckRope) VM.neckRope.scale.set(1, 1, 1);
      if (frac < 1) {
        requestAnimationFrame(bFrame);
      } else {
        // Done!
        poseSpring = 1.0;
        isDead = false;
        isRespawning = false;
        respawnPhase = 3;
        hp = maxHp;
        PC.forEach(c => c.stiff = .96);
        updateHpUI();
        // Celebratory jingle
        playSound('coin'); setTimeout(() => playSound('coin'), 120);
      }
    }
    requestAnimationFrame(bFrame);
  }

  requestAnimationFrame(riseFrame);
}

function getCenter() {
  const c = new THREE.Vector3();
  PP.forEach(p => c.add(p.pos)); return c.divideScalar(PP.length);
}

// ── Damage ────────────────────────────────────────────────────
function dealDamage(amount, sx, sy) {
  if (isDead || isRespawning) return;
  hp = Math.max(0, hp - amount);
  const earned = Math.max(1, Math.floor(amount / 2.8));
  coins += earned; hitCount++;
  // Combo system
  const now = performance.now()/1000;
  if (now - lastComboT < 1.5) comboCount++;
  else comboCount = 1;
  lastComboT = now; lastHitTime = now;
  if (comboCount >= 3) showCombo(comboCount);
  updateHpUI(); updateCoinUI();
  spawnFloat(sx, sy, amount, false);
  setTimeout(() => spawnFloat(sx, sy - 32, earned, true), 180);
  document.getElementById('hitCount').textContent = hitCount;
  tryUnlock();
  playSound('coin');
  if (hp <= 0) die();
}

// ══════════════════════════════════════════════════════════════
//  WEAPON FIRE
// ══════════════════════════════════════════════════════════════
const RC = new THREE.Raycaster();

function fireAt(ndcX, ndcY, sx, sy) {
  if (isDead || isRespawning) return;
  const now = performance.now()/1000;
  const w = WEAPONS[selWeapon];
  if (now - lastFireT < w.cd) return;
  lastFireT = now;

  RC.setFromCamera({ x: ndcX, y: ndcY }, camera);
  const hits = RC.intersectObjects(hitSpheres);

  // Broad sphere fallback
  let hitPt = null, nearIdx = -1;
  if (hits.length > 0) {
    hitPt = hits[0].point.clone();
    nearIdx = hitSpheres.indexOf(hits[0].object);
  } else {
    const ctr = getCenter();
    const ro = RC.ray.origin, rd = RC.ray.direction;
    const oc = ro.clone().sub(ctr);
    const b = 2*oc.dot(rd), c = oc.dot(oc)-2.25;
    const disc = b*b - 4*c;
    if (disc >= 0) {
      const t = (-b - Math.sqrt(disc)) / 2;
      if (t > 0) {
        hitPt = ro.clone().addScaledVector(rd, t);
        let md = Infinity;
        PP.forEach((p, i) => {
          const d = p.pos.distanceTo(hitPt);
          if (d < md) { md = d; nearIdx = i; }
        });
      }
    }
  }
  if (!hitPt) return;

  const dir = new THREE.Vector3().subVectors(hitPt, camera.position).normalize();

  switch (selWeapon) {
    case 'punch': {
      playSound('punch');
      areaImpact(hitPt, .9, w.force, .8);
      blood(hitPt); sparks(hitPt, 5);
      flashScreen('rgba(255,50,0,.2)');
      shakeCamera(.12);
      dealDamage(w.dmg + randInt(8), sx, sy);
      break;
    }
    case 'pistol': {
      playSound('gun');
      if (nearIdx >= 0) PP[nearIdx].impulse(dir.x*w.force, dir.y*w.force*.5+4, dir.z*w.force);
      areaImpact(hitPt, .55, w.force*.5, .3);
      sparks(hitPt); blood(hitPt, 4);
      flashScreen('rgba(255,200,0,.15)');
      shakeCamera(.1);
      dealDamage(w.dmg + randInt(10), sx, sy);
      break;
    }
    case 'shotgun': {
      playSound('shotgun');
      areaImpact(hitPt, 1.4, w.force, 1.1);
      blood(hitPt, 9); sparks(hitPt, 10);
      flashScreen('rgba(255,120,0,.25)');
      shakeCamera(.22);
      dealDamage(w.dmg + randInt(16), sx, sy);
      break;
    }
    case 'grenade': {
      playSound('punch');
      GRENADES.push(new GrenadePrj(hitPt, w.force));
      break; // damage handled in boom()
    }
    case 'laser': {
      playSound('laser');
      if (nearIdx >= 0) PP[nearIdx].impulse(dir.x*w.force, dir.y*w.force*.3+2, dir.z*w.force);
      showLaser(camera.position, hitPt);
      flashScreen('rgba(0,220,255,.1)');
      dealDamage(w.dmg, sx, sy);
      break;
    }
  }
}

// ══════════════════════════════════════════════════════════════
//  UI
// ══════════════════════════════════════════════════════════════
function updateHpUI() {
  const pct = Math.max(0,(hp/maxHp)*100);
  const fill = document.getElementById('hpFill');
  fill.style.width = pct + '%';
  fill.style.background = pct > 55
    ? 'linear-gradient(90deg,#22ff44,#77ff66)'
    : pct > 25
    ? 'linear-gradient(90deg,#ffaa00,#ffdd44)'
    : 'linear-gradient(90deg,#ff2222,#ff6666)';
}
function updateCoinUI() {
  document.getElementById('coinNum').textContent = coins;
}

function tryUnlock() {
  let changed = false;
  for (const [id, w] of Object.entries(WEAPONS)) {
    if (!unlocked.has(id) && coins >= w.cost) {
      unlocked.add(id); changed = true;
      showToast(`🔓 ${w.label} UNLOCKED!`);
    }
  }
  if (changed) buildWeaponBar();
}

function showToast(txt) {
  const t = document.getElementById('toast');
  t.textContent = txt; t.style.display = 'block';
  clearTimeout(t._tid);
  t._tid = setTimeout(() => t.style.display='none', 2500);
}

function spawnFloat(x, y, val, isCoin) {
  const el = document.createElement('div');
  el.className = 'flt ' + (isCoin ? 'coin' : 'dmg');
  el.textContent = isCoin ? `+${val}🪙` : `-${val}`;
  el.style.left = (x - 25 + (Math.random()-.5)*50) + 'px';
  el.style.top  = (y - 10) + 'px';
  document.body.appendChild(el);
  el.addEventListener('animationend', () => el.remove(), { once: true });
}

function showCombo(n) {
  const el = document.getElementById('combo');
  el.textContent = `${n}x COMBO!`;
  el.style.display = 'block';
  el.style.animation = 'none';
  el.offsetHeight; // reflow
  el.style.animation = 'comboPop .5s ease forwards';
  clearTimeout(el._tid);
  el._tid = setTimeout(() => el.style.display='none', 900);
}

function selectWeapon(id) {
  if (!unlocked.has(id)) {
    if (coins >= WEAPONS[id].cost) {
      coins -= WEAPONS[id].cost; unlocked.add(id);
      updateCoinUI(); buildWeaponBar();
      showToast(`🔓 ${WEAPONS[id].label} UNLOCKED!`);
    } else {
      showToast(`Need 🪙${WEAPONS[id].cost} coins!`);
      return;
    }
  }
  selWeapon = id;
  document.querySelectorAll('.wBtn').forEach(b =>
    b.classList.toggle('sel', b.dataset.id === id));
}

function buildWeaponBar() {
  const bar = document.getElementById('wBar');
  bar.innerHTML = '';
  for (const [id, w] of Object.entries(WEAPONS)) {
    const btn = document.createElement('div');
    btn.className = 'wBtn' + (id === selWeapon ? ' sel' : '') + (!unlocked.has(id) ? ' locked' : '');
    btn.dataset.id = id;
    btn.innerHTML = `<span class="wIcon">${w.icon}</span><span class="wLabel">${w.label}</span>`
      + (!unlocked.has(id) ? `<span class="wCost">🪙${w.cost}</span>` : '');
    btn.addEventListener('pointerdown', e => { e.stopPropagation(); selectWeapon(id); });
    bar.appendChild(btn);
  }
}

// ══════════════════════════════════════════════════════════════
//  CAMERA ORBIT
// ══════════════════════════════════════════════════════════════
let orb = { ax: .28, ay: .0, dist: 7.2 };
let camShakeT = 0, camShakeAmt = 0;
let isDrag = false, dragStart = { x:0, y:0 }, lastPtr = { x:0, y:0 };

function shakeCamera(amt) { camShakeT = .45; camShakeAmt = amt; }

function flashScreen(rgba) {
  const f = document.getElementById('flash');
  f.style.background = rgba; f.style.opacity = '1';
  setTimeout(() => f.style.opacity='0', 50);
  setTimeout(() => f.style.background='rgba(255,80,0,.35)', 200);
}

function updateCam(dt) {
  const tx = orb.dist * Math.sin(orb.ay) * Math.cos(orb.ax);
  const ty = orb.dist * Math.sin(orb.ax) + 1.5;
  const tz = orb.dist * Math.cos(orb.ay) * Math.cos(orb.ax);
  camera.position.set(tx, Math.max(.5, ty), tz);
  camera.lookAt(0, 1.5, 0);
  if (camShakeT > 0) {
    camShakeT -= dt;
    const s = camShakeAmt * (camShakeT/.45);
    camera.position.x += (Math.random()-.5)*s;
    camera.position.y += (Math.random()-.5)*s*.5;
  }
}

// ══════════════════════════════════════════════════════════════
//  INPUT HANDLING
// ══════════════════════════════════════════════════════════════
function ndc(cx, cy) {
  return { x: (cx/innerWidth)*2-1, y: -(cy/innerHeight)*2+1 };
}

// ── Mouse ────────────────────────────────────────────────────
canvas.addEventListener('pointerdown', e => {
  if (e.button !== 0) return;
  isDrag = false;
  dragStart = { x: e.clientX, y: e.clientY };
  lastPtr  = { x: e.clientX, y: e.clientY };
  canvas.setPointerCapture(e.pointerId);
});

canvas.addEventListener('pointermove', e => {
  if (e.buttons !== 1) return;
  const dx = e.clientX - lastPtr.x, dy = e.clientY - lastPtr.y;
  const tx = e.clientX - dragStart.x, ty = e.clientY - dragStart.y;
  if (Math.abs(tx)>4 || Math.abs(ty)>4) isDrag = true;
  orb.ay -= dx * .0045;
  orb.ax -= dy * .0045;
  orb.ax = Math.max(-.25, Math.min(1.25, orb.ax));
  lastPtr = { x: e.clientX, y: e.clientY };
});

canvas.addEventListener('pointerup', e => {
  if (!isDrag) {
    const n = ndc(e.clientX, e.clientY);
    fireAt(n.x, n.y, e.clientX, e.clientY);
  }
  isDrag = false;
});

canvas.addEventListener('wheel', e => {
  orb.dist = Math.max(3, Math.min(13, orb.dist + e.deltaY*.012));
}, { passive: true });

// ── Pinch to zoom (touch) ────────────────────────────────────
let prevPinch = 0;
canvas.addEventListener('touchstart', e => {
  if (e.touches.length === 2) {
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    prevPinch = Math.sqrt(dx*dx+dy*dy);
  }
}, { passive: true });

canvas.addEventListener('touchmove', e => {
  if (e.touches.length === 2) {
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    const d = Math.sqrt(dx*dx+dy*dy);
    if (prevPinch > 0) orb.dist = Math.max(3, Math.min(13, orb.dist * prevPinch/d));
    prevPinch = d;
  }
}, { passive: true });

// ══════════════════════════════════════════════════════════════
//  GAME LOOP
// ══════════════════════════════════════════════════════════════
let lastT = performance.now();
const PHYS_STEP = 1/60;
let physAcc = 0;

function loop(ts) {
  requestAnimationFrame(loop);
  let dt = Math.min((ts - lastT)/1000, .05);
  lastT = ts; gameTime += dt;

  if (isDead && !isRespawning) {
    respawnT -= dt;
    if (respawnT <= 0) respawn();
  }

  // Physics: run always (even during respawn so spring pulls to pose)
  physAcc += dt;
  while (physAcc >= PHYS_STEP) {
    if (!isDead || isRespawning) applyIdle(gameTime);
    stepPhysics(PHYS_STEP);
    physAcc -= PHYS_STEP;
  }

  syncMeshes();
  syncHitSpheres();
  tickFX(dt);
  tickGrenades(dt);
  updateCam(dt);
  renderer.render(scene, camera);
}

// ══════════════════════════════════════════════════════════════
//  BOOT
// ══════════════════════════════════════════════════════════════
initRagdoll();
buildWeaponBar();
updateHpUI();
updateCoinUI();
loop(performance.now());
</script>
