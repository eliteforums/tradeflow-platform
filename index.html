    <!-- JSON-LD: FAQPage -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "Is my identity truly anonymous?",
          "acceptedAnswer": { "@type": "Answer", "text": "Yes. Eternia uses username-based login — no email, phone number, or real name is required. Your personal data is AES-256 encrypted and can only be accessed under formal crisis protocols authorized by your institution's SPOC." }
        },
        {
          "@type": "Question",
          "name": "How does the ECC (Eternia Care Credits) system work?",
          "acceptedAnswer": { "@type": "Answer", "text": "Each student receives 100 ECC on signup. Credits are used for Expert Connect (50 ECC), Peer Connect (20 ECC), and BlackBox sessions (30 ECC). You earn more through daily quests, streaks, and self-help activities." }
        },
        {
          "@type": "Question",
          "name": "What is the BlackBox feature?",
          "acceptedAnswer": { "@type": "Answer", "text": "BlackBox is an anonymous emotional expression space where students can write or record their thoughts privately. An AI layer monitors content for crisis signals and triggers confidential escalation if needed." }
        },
        {
          "@type": "Question",
          "name": "How do institutions get started?",
          "acceptedAnswer": { "@type": "Answer", "text": "Three simple steps: Enter your institution code, scan the QR code from your SPOC, and create your anonymous username. Setup takes under 5 minutes." }
        },
        {
          "@type": "Question",
          "name": "Is Eternia DPDP 2023 compliant?",
          "acceptedAnswer": { "@type": "Answer", "text": "Yes. Eternia is designed for India's Digital Personal Data Protection Act with consent withdrawal, data erasure, purpose-limited processing, and full audit trails." }
        },
        {
          "@type": "Question",
          "name": "Can students be identified by counsellors?",
          "acceptedAnswer": { "@type": "Answer", "text": "No. Counsellors interact using only anonymous usernames. Real identity is encrypted and only accessible through a formal escalation process requiring SPOC authorization and admin approval." }
        },
        {
          "@type": "Question",
          "name": "What happens if I lose my password?",
          "acceptedAnswer": { "@type": "Answer", "text": "During onboarding, you set up a recovery system using emoji patterns and fragment pairs — no email needed. Your SPOC can also reset your device binding." }
        }
      ]
    }
